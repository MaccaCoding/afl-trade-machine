<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AFL Career Mode</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Sidebar Menu -->
  <nav id="sidebar">
    <h2>Career Mode</h2>
    <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('fixtures')">Fixtures & Results</button>
    <button onclick="showSection('lineup')">Team Lineup</button>
    <button onclick="showSection('tactics')">Team Tactics</button>
    <button onclick="showSection('coaching')">Coaching</button>
    <button onclick="showSection('draft')">Drafting</button>
    <button onclick="showSection('freeAgency')">Free Agency</button>
    <button onclick="showSection('trade')">Trade</button>
    <button onclick="showSection('teamStats')">Team Stats</button>
    <button onclick="showSection('playerStats')">Player Stats</button>
    <button onclick="showSection('awards')">Awards</button>
    <button onclick="showSection('finals')">Finals</button>
  </nav>

  <!-- Main Content Area -->
  <main>
    <!-- Home Tab -->
    <section id="home">
      <div id="selectedTeamBox"></div>
      <div id="nextFixtureBox"></div>
      <div id="ladderBox"></div>
    </section>

    <!-- Fixtures & Results -->
    <section id="fixtures">
      <h1>Fixtures & Results</h1>
      <div id="roundControls">
        <button id="prevRound">&lt; Previous Round</button>
        <span id="roundDisplay">Round 1</span>
        <button id="nextRound">Next Round &gt;</button>
      </div>
      <div id="fixturesContent"></div>
    </section>

    <!-- Team Lineup -->
    <section id="lineup">
      <h1>Team Lineup</h1>
      <div id="lineupWrapper">
        <div id="selectedTeamLineup"></div>
        <div id="otherTeamSelector">
          <label for="otherTeamSelect">View Other Team:</label>
          <select id="otherTeamSelect"></select>
        </div>
      </div>
      <div id="teamRatings"></div>
    </section>

    <!-- Team Tactics -->
    <section id="tactics">
      <h1>Team Tactics</h1>
      <div id="tacticsPage1"></div>
      <div id="tacticsPage2"></div>
    </section>

    <!-- Coaching -->
    <section id="coaching">
      <h1>Coaching Staff</h1>
      <div id="headCoachBox"></div>
      <div id="assistantCoachesBox"></div>
      <div id="scoutsBox"></div>
      <div id="medicalBox"></div>
      <div id="freeAgentCoachesBox"></div>
    </section>

    <!-- Drafting -->
    <section id="draft">
      <h1>Draft Board</h1>
      <p id="draftHints">Hint: Focus on positions or types your team needs.</p>
      <div id="draftBoard"></div>
    </section>

    <!-- Free Agency -->
    <section id="freeAgency">
      <h1>Free Agency</h1>
      <div id="freeAgencyContent"></div>
    </section>

    <!-- Trade -->
    <section id="trade">
      <h1>Trade Machine</h1>
      <div id="tradeYourTeam"></div>
      <div id="tradeOtherTeams"></div>
    </section>

    <!-- Team Stats -->
    <section id="teamStats">
      <h1>Team Stats</h1>
      <div id="teamStatsTable"></div>
    </section>

    <!-- Player Stats -->
    <section id="playerStats">
      <h1>Player Stats</h1>
      <div id="playerStatsContent"></div>
    </section>

    <!-- Awards -->
    <section id="awards">
      <h1>Awards</h1>
      <div id="awardsContent"></div>
    </section>

    <!-- Finals -->
    <section id="finals">
      <h1>Finals</h1>
      <div id="finalsBracket"></div>
      <div id="finalsStats"></div>
    </section>
  </main>

  <!-- JS Link -->
  <script src="script.js"></script>

</body>
</html>
