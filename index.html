<!DOCTYPE html>

<title>AFL Trade Machine - Full Stats</title>
<style>
body { font-family: Arial, sans-serif; background-color: #f3f3f3; margin:0; padding:0; text-align: center; }
h1, h2 { color: #222; }
.container { max-width: 1400px; margin: 20px auto; padding: 10px; }
.team-selection { display: flex; flex-wrap: wrap; justify-content: space-around; margin-top: 20px; }
.team-box { width: 90%; max-width: 650px; background-color: white; padding: 20px; margin: 10px; border-radius: 10px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); text-align: left; }
select, input { display: block; margin: 10px 0; padding: 8px; width: 100%; border-radius: 5px; border: 1px solid #ccc; }
button { padding: 10px 20px; margin: 10px 0; font-size: 16px; border-radius: 5px; cursor: pointer; border: none; background-color: #0077cc; color: white; }
button:hover { background-color: #005fa3; }
#tradeResult, #coachingResult { font-weight: bold; margin-top: 20px; font-size: 18px; }
.stats-box { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
.stats-box label { font-weight: bold; }
</style>
</head>
