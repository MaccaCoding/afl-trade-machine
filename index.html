<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFL Trade Machine & Coaching Simulator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f3f3f3;
    margin: 0;
    padding: 0;
    text-align: center;
  }
  h1, h2 {
    color: #222;
  }
  .container {
    max-width: 1000px;
    margin: 20px auto;
    padding: 10px;
  }
  .trade-section, .coach-section {
    background-color: white;
    padding: 20px;
    margin: 20px 0;
    border-radius: 10px;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
  }
  select, input {
    display: block;
    margin: 10px auto;
    padding: 8px;
    width: 150px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }
  button {
    padding: 10px 20px;
    margin: 15px;
    font-size: 16px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background-color: #0077cc;
    color: white;
    transition: 0.3s;
  }
  button:hover { background-color: #005fa3; }
  #resultTrade, #resultCoach {
    font-weight: bold;
    margin-top: 20px;
    font-size: 18px;
  }
</style>
</head>
<body>

<div class="container">
  <h1>AFL Trade Machine & Coaching Simulator</h1>

  <!-- TRADE MACHINE SECTION -->
  <div class="trade-section">
    <h2>Trade Machine</h2>

    <div>
      <h3>Team A</h3>
      <select id="teamA">
        <option value="Collingwood">Collingwood</option>
        <option value="Carlton">Carlton</option>
        <option value="Richmond">Richmond</option>
      </select>
      <input id="valueA" type="number" placeholder="Player + draft value">
    </div>

    <div>
      <h3>Team B</h3>
      <select id="teamB">
        <option value="Carlton">Carlton</option>
        <option value="Collingwood">Collingwood</option>
        <option value="Richmond">Richmond</option>
      </select>
      <input id="valueB" type="number" placeholder="Player + draft value">
    </div>

    <button onclick="evaluateTrade()">Evaluate Trade</button>
    <div id="resultTrade"></div>
  </div>

  <!-- COACHING SIMULATOR SECTION -->
  <div class="coach-section">
    <h2>Coaching Simulator</h2>

    <div>
      <label>Pick a Team:</label>
      <select id="coachTeam">
        <option value="Collingwood">Collingwood</option>
        <option value="Carlton">Carlton</option>
        <option value="Richmond">Richmond</option>
      </select>
    </div>

    <div>
      <label>Choose Tactics:</label>
      <select id="tactics">
        <option value="attack">Attack</option>
        <option value="defence">Defence</option>
        <option value="pressure">Pressure</option>
      </select>
    </div>

    <div>
      <label>Player Attributes:</label>
      <input type="number" id="playerAttack" placeholder="Team attack (0-100)">
      <input type="number" id="playerDefence" placeholder="Team defence (0-100)">
      <input type="number" id="playerSpeed" placeholder="Team speed (0-100)">
    </div>

    <button onclick="simulateMatch()">Simulate Match</button>
    <div id="resultCoach"></div>
  </div>
</div>

<script>
  // Simple Trade Evaluation
  function evaluateTrade(){
    let a = Number(document.getElementById("valueA").value);
    let b = Number(document.getElementById("valueB").value);
    let teamA = document.getElementById("teamA").value;
    let teamB = document.getElementById("teamB").value;

    if(isNaN(a) || isNaN(b)){
      document.getElementById("resultTrade").innerText = "Please enter values for both teams!";
      return;
    }

    let diff = Math.abs(a-b);
    if(diff < 10){
      document.getElementById("resultTrade").innerText = `Fair Trade between ${teamA} and ${teamB}!`;
    } else if(a > b){
      document.getElementById("resultTrade").innerText = `${teamA} gets the better deal!`;
    } else {
      document.getElementById("resultTrade").innerText = `${teamB} gets the better deal!`;
    }
  }

  // Simple Coaching Simulation
  function simulateMatch(){
    let attack = Number(document.getElementById("playerAttack").value);
    let defence = Number(document.getElementById("playerDefence").value);
    let speed = Number(document.getElementById("playerSpeed").value);
    let tactics = document.getElementById("tactics").value;
    let team = document.getElementById("coachTeam").value;

    if(isNaN(attack) || isNaN(defence) || isNaN(speed)){
      document.getElementById("resultCoach").innerText = "Enter all player attributes!";
      return;
    }

    // Simple scoring system
    let score = attack*0.4 + defence*0.3 + speed*0.3;
    // Randomness
    let chance = Math.random() * 20;
    score += chance;

    document.getElementById("resultCoach").innerText = 
      `${team} using ${tactics} tactics scores ${Math.round(score)} points!`;
  }
</script>

</body>
</html>
