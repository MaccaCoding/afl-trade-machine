<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AFL Career Mode</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= Sidebar Menu ================= -->
<nav id="sidebar">
  <h2>Career Mode</h2>
  <button class="menuBtn" data-tab="homeTab">Home</button>
  <button class="menuBtn" data-tab="fixturesTab">Fixtures & Results</button>
  <button class="menuBtn" data-tab="lineupTab">Team Lineup</button>
  <button class="menuBtn" data-tab="tacticsTab">Team Tactics</button>
  <button class="menuBtn" data-tab="coachingTab">Coaching</button>
  <button class="menuBtn" data-tab="draftTab">Drafting</button>
  <button class="menuBtn" data-tab="freeAgencyTab">Free Agency</button>
  <button class="menuBtn" data-tab="tradeTab">Trade</button>
  <button class="menuBtn" data-tab="teamStatsTab">Team Stats</button>
  <button class="menuBtn" data-tab="playerStatsTab">Player Stats</button>
  <button class="menuBtn" data-tab="awardsTab">Awards</button>
  <button class="menuBtn" data-tab="finalsTab">Finals</button>
</nav>

<!-- ================= Main Content ================= -->
<main id="mainContent">

  <!-- Home Tab -->
  <section id="homeTab">
    <h1>Home</h1>
    <div id="selectedTeamBox"></div>
    <div id="nextFixtureBox"></div>
    <div id="ladderBox"></div>
  </section>

  <!-- Fixtures & Results Tab -->
  <section id="fixturesTab">
    <h1>Fixtures & Results</h1>
    <div id="roundControls">
      <button id="prevRound">&lt; Previous Round</button>
      <span id="roundDisplay">Round 1</span>
      <button id="nextRound">Next Round &gt;</button>
    </div>
    <div id="fixturesContent"></div>
  </section>

  <!-- Team Lineup Tab -->
  <section id="lineupTab">
    <h1>Team Lineup</h1>
    <div id="lineupWrapper">
      <div id="selectedTeamLineup"></div>
      <div id="otherTeamSelector">
        <label for="otherTeamSelect">View Other Team:</label>
        <select id="otherTeamSelect"></select>
      </div>
    </div>
    <div id="teamRatings"></div>
  </section>

  <!-- Team Tactics Tab -->
  <section id="tacticsTab">
    <h1>Team Tactics</h1>
    <div id="tacticsPage1"></div>
    <div id="tacticsPage2"></div>
  </section>

  <!-- Coaching Tab -->
  <section id="coachingTab">
    <h1>Coaching Staff</h1>
    <div id="headCoachBox"></div>
    <div id="assistantCoachesBox"></div>
    <div id="scoutsBox"></div>
    <div id="medicalBox"></div>
    <div id="freeAgentCoachesBox"></div>
  </section>

  <!-- Drafting Tab -->
  <section id="draftTab">
    <h1>Draft Board</h1>
    <p id="draftHints">Hint: Focus on positions or types your team needs.</p>
    <div id="draftBoard"></div>
  </section>

  <!-- Free Agency Tab -->
  <section id="freeAgencyTab">
    <h1>Free Agency</h1>
    <div id="freeAgencyContent"></div>
  </section>

  <!-- Trade Tab -->
  <section id="tradeTab">
    <h1>Trade Machine</h1>
    <div id="tradeYourTeam"></div>
    <div id="tradeOtherTeams"></div>
  </section>

  <!-- Team Stats Tab -->
  <section id="teamStatsTab">
    <h1>Team Stats</h1>
    <div id="teamStatsTable"></div>
  </section>

  <!-- Player Stats Tab -->
  <section id="playerStatsTab">
    <h1>Player Stats</h1>
    <div id="playerStatsContent"></div>
  </section>

  <!-- Awards Tab -->
  <section id="awardsTab">
    <h1>Awards</h1>
    <div id="awardsContent"></div>
  </section>

  <!-- Finals Tab -->
  <section id="finalsTab">
    <h1>Finals</h1>
    <div id="finalsBracket"></div>
    <div id="finalsStats"></div>
  </section>

</main>

<!-- ================= Scripts ================= -->
<script src="players.js"></script>       <!-- player data -->
<script src="home.js"></script>          <!-- home rendering -->
<script src="menuNavigation.js"></script> <!-- tab navigation -->
<script src="lineup.js"></script>        <!-- lineup logic -->
<script src="tactics.js"></script>       <!-- tactics logic -->
<script src="careerTabs.js"></script>    <!-- other tabs -->
<script src="fixtures.js"></script> 
</body>
</html>
